<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>NHN OB 골프 정산</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #f9fafb; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useRef, useEffect } = React;

    const PLAYER_COLORS = ["#2563EB","#DC2626","#059669","#7C3AED","#DB2777","#D97706","#0891B2","#65A30D"];
    const MEMBERS = ["김동용","김동훈","김승환","김진욱","나정식","류상우","안성민","우상준","이승곤","이주영","이진성","최승용"];
    const DEFAULT_NAMES = ["플레이어1","플레이어2","플레이어3","플레이어4","플레이어5","플레이어6","플레이어7","플레이어8"];

    function calcHole(rawScores, par, unitPrice, playerCount, doubleRule, birdiePlus) {
      const sc = rawScores.slice(0, playerCount).map(s => parseInt(s));
      if(sc.some(s => isNaN(s))) return null;
      const isSpecial = s => s <= par - 1;
      const isTriplePlus = s => s >= par + 3;
      const specialIdx = sc.map((s,i) => isSpecial(s)?i:-1).filter(i=>i>=0);
      const hasSpecial = specialIdx.length > 0;
      const hasTriplePlus = sc.some(isTriplePlus);
      const minScore = Math.min(...sc);
      const minCount = sc.filter(s => s === minScore).length;
      const isGroupTie = minCount >= Math.ceil(playerCount * 3 / 4);
      const multiplier = doubleRule && (hasSpecial || isGroupTie || hasTriplePlus) ? 2 : 1;
      const effectiveUnit = unitPrice * multiplier;
      const settlements = Array(playerCount).fill(0);
      const pairs = [];
      for(let i = 0; i < playerCount; i++) {
        for(let j = i+1; j < playerCount; j++) {
          const iSp = isSpecial(sc[i]), jSp = isSpecial(sc[j]);
          let diff = sc[j] - sc[i];
          if(birdiePlus && hasSpecial && iSp !== jSp) diff += iSp ? 1 : -1;
          const amount = Math.abs(diff) * effectiveUnit;
          if(diff > 0) { settlements[i] += amount; settlements[j] -= amount; }
          else if(diff < 0) { settlements[j] += amount; settlements[i] -= amount; }
          pairs.push({ i, j, sc_i: sc[i], sc_j: sc[j], iSp, jSp, adjDiff: diff, amount });
        }
      }
      return { settlements, hasSpecial, isGroupTie, hasTriplePlus, multiplier, effectiveUnit, pairs, sc };
    }

    const SCORE_META = (d) => {
      if(d <= -3) return { short:"알바", color:"#7C3AED" };
      if(d === -2) return { short:"이글", color:"#7C3AED" };
      if(d === -1) return { short:"버디", color:"#059669" };
      if(d === 0)  return { short:"파", color:"#6B7280" };
      if(d === 1)  return { short:"보기", color:"#D97706" };
      if(d === 2)  return { short:"더블", color:"#DC2626" };
      if(d === 3)  return { short:"트리플", color:"#DC2626" };
      return { short:"+"+d, color:"#DC2626" };
    };

    function PlayerPicker({ pi, name, names, playerCount, color, onChange, onSelect }) {
      const [open, setOpen] = useState(false);
      const wrapRef = useRef(null);
      const dropRef = useRef(null);
      const [rect, setRect] = useState(null);

      useEffect(() => {
        const handler = e => {
          if(!wrapRef.current?.contains(e.target) && !dropRef.current?.contains(e.target)) setOpen(false);
        };
        document.addEventListener("mousedown", handler);
        return () => document.removeEventListener("mousedown", handler);
      }, []);

      const toggle = () => {
        if(!open && wrapRef.current) setRect(wrapRef.current.getBoundingClientRect());
        setOpen(v => !v);
      };

      const players = names.slice(0, playerCount);

      return (
        <div ref={wrapRef} style={{position:"relative"}}>
          <div onClick={toggle} style={{display:"flex",alignItems:"center",gap:10,background:"#fff",border:`1.5px solid ${open?color:"#e5e7eb"}`,borderRadius:12,padding:"10px 12px",cursor:"pointer"}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:color,flexShrink:0}}/>
            <input value={name} onChange={e=>onChange(e.target.value)} onClick={e=>e.stopPropagation()} placeholder="이름 입력"
              style={{border:"none",background:"transparent",fontSize:14,fontWeight:500,color:"#111",fontFamily:"inherit",outline:"none",width:"100%",minWidth:0}}/>
            <svg width="12" height="12" viewBox="0 0 12 12" style={{flexShrink:0,opacity:0.4,transform:open?"rotate(180deg)":"none",transition:"transform 0.15s"}}>
              <path d="M2 4l4 4 4-4" stroke="currentColor" strokeWidth="1.5" fill="none" strokeLinecap="round"/>
            </svg>
          </div>
          {open && rect && (
            <div ref={dropRef} style={{position:"fixed",top:rect.bottom+4,left:rect.left,width:rect.width,zIndex:9999,borderRadius:12,overflow:"hidden",maxHeight:200,overflowY:"auto",background:"#fff",border:`1px solid ${color}44`,boxShadow:"0 12px 40px rgba(0,0,0,0.18)"}}>
              {MEMBERS.map(m => {
                const sel = name===m, used = players.includes(m)&&!sel;
                return (
                  <div key={m} onClick={()=>{if(!used){onSelect(m);setOpen(false);}}}
                    style={{padding:"10px 14px",fontSize:14,cursor:used?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",background:sel?color+"15":"#fff",color:used?"#ccc":sel?color:"#111",fontWeight:sel?500:400,borderBottom:"1px solid #f3f3f3"}}
                    onMouseEnter={e=>{if(!used)e.currentTarget.style.background=sel?color+"25":"#f7f7f7";}}
                    onMouseLeave={e=>{e.currentTarget.style.background=sel?color+"15":"#fff";}}>
                    {m}
                    {sel && <svg width="14" height="11" viewBox="0 0 14 11"><polyline points="1,6 5,10 13,1" stroke={color} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    function Toggle({ checked, onChange, label }) {
      return (
        <div onClick={onChange} style={{display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",padding:"14px 0"}}>
          <span style={{fontSize:15,fontWeight:500,color:"#111"}}>{label}</span>
          <div style={{width:46,height:26,borderRadius:13,background:checked?"#059669":"#d1d5db",position:"relative",transition:"background 0.2s",flexShrink:0}}>
            <div style={{position:"absolute",top:3,left:checked?23:3,width:20,height:20,borderRadius:"50%",background:"#fff",boxShadow:"0 1px 4px rgba(0,0,0,0.2)",transition:"left 0.2s"}}/>
          </div>
        </div>
      );
    }

    function Logo() {
      return (
        <svg viewBox="0 0 180 44" style={{height:36,width:"auto"}}>
          <defs>
            <linearGradient id="ng1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stopColor="#3B82F6"/><stop offset="100%" stopColor="#1D4ED8"/></linearGradient>
            <linearGradient id="ng2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stopColor="#10B981"/><stop offset="100%" stopColor="#065F46"/></linearGradient>
          </defs>
          <text x="0" y="34" fontFamily="'Arial Black',Arial,sans-serif" fontWeight="900" fontSize="34" fill="url(#ng1)">NHN</text>
          <text x="98" y="34" fontFamily="'Arial Black',Arial,sans-serif" fontWeight="900" fontSize="34" fill="url(#ng2)">OB</text>
          <circle cx="162" cy="8" r="6" fill="white" stroke="#065F46" strokeWidth="1"/>
          <path d="M157.5 8 Q162 5.5 166.5 8" stroke="#bbb" strokeWidth="0.7" fill="none"/>
          <path d="M157.5 8 Q162 10.5 166.5 8" stroke="#bbb" strokeWidth="0.7" fill="none"/>
        </svg>
      );
    }

    function App() {
      const [screen, setScreen] = useState("setup");
      const [playerCount, setPlayerCount] = useState(4);
      const [names, setNames] = useState([...DEFAULT_NAMES]);
      const [unitPrice, setUnitPrice] = useState(1000);
      const [doubleRule, setDoubleRule] = useState(true);
      const [birdiePlus, setBirdiePlus] = useState(true);
      const [pars, setPars] = useState(() => Array(18).fill(4));
      const [scores, setScores] = useState(() => Array.from({length:8},()=>Array(18).fill(null)));
      const [confirmed, setConfirmed] = useState(() => Array(18).fill(false));
      const [hole, setHole] = useState(0);
      const [showDetail, setShowDetail] = useState(false);
      const [showResult, setShowResult] = useState(false);

      const players = names.slice(0, playerCount);
      const dispScore = (pi, hi) => scores[pi][hi] ?? pars[hi];

      function adjScore(pi, d) {
        setScores(prev => {
          const n = prev.map(r=>[...r]);
          const cur = n[pi][hole] ?? pars[hole];
          n[pi][hole] = Math.max(1, Math.min(12, cur + d));
          return n;
        });
      }

      function adjPar(d) {
        const newPar = Math.max(3, Math.min(5, pars[hole] + d));
        setPars(prev => { const n=[...prev]; n[hole]=newPar; return n; });
        setScores(prev => { const n=prev.map(r=>[...r]); players.forEach((_,pi)=>{n[pi][hole]=null;}); return n; });
        setConfirmed(prev => { const n=[...prev]; n[hole]=false; return n; });
      }

      function confirmHole() {
        setScores(prev => {
          const n = prev.map(r=>[...r]);
          players.forEach((_,pi) => { if(n[pi][hole]===null) n[pi][hole]=pars[hole]; });
          return n;
        });
        setConfirmed(prev => { const n=[...prev]; n[hole]=true; return n; });
        setShowDetail(false);
        if(hole < 17) setHole(h=>h+1);
        else setShowResult(true);
      }

      const results = useMemo(() =>
        Array.from({length:18},(_,hi) =>
          calcHole(scores.map(r => r[hi]??pars[hi]), pars[hi], unitPrice, playerCount, doubleRule, birdiePlus)
        ), [scores, pars, playerCount, unitPrice, doubleRule, birdiePlus]);

      const cumulative = useMemo(() => {
        const c = Array(playerCount).fill(0);
        results.forEach((r,hi) => { if(r && confirmed[hi]) r.settlements.forEach((a,pi)=>{c[pi]+=a;}); });
        return c;
      }, [results, confirmed, playerCount]);

      const cur = results[hole];
      const maxAbs = Math.max(...cumulative.map(v=>Math.abs(Math.round(v))), 1);
      const fmtAmt = v => v===0?"±0":(v>0?"+":"")+Math.round(v).toLocaleString()+"원";

      const pill = (c,bg) => ({fontSize:11,fontWeight:500,padding:"3px 9px",borderRadius:20,background:bg||c+"15",color:c});
      const circleBtn = {width:40,height:40,borderRadius:"50%",border:"0.5px solid #e5e7eb",background:"#f9fafb",cursor:"pointer",fontSize:20,color:"#111",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit",flexShrink:0};
      const card = {background:"#fff",border:"0.5px solid #e5e7eb",borderRadius:16,overflow:"hidden"};

      if(screen==="setup") return (
        <div style={{maxWidth:420,margin:"0 auto",padding:"0 0 60px",background:"#f9fafb",minHeight:"100vh"}}>
          <div style={{padding:"28px 20px 20px",borderBottom:"0.5px solid #e5e7eb",background:"#fff"}}>
            <Logo/>
            <div style={{fontSize:13,color:"#6b7280",marginTop:4}}>홀별 정산 앱</div>
          </div>
          <div style={{padding:"20px 20px 0"}}>
            <div style={{fontSize:11,fontWeight:500,color:"#9ca3af",letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:10}}>인원</div>
            <div style={{display:"flex",gap:8}}>
              {[2,3,4,5,6,7,8].map(n=>(
                <button key={n} onClick={()=>setPlayerCount(n)} style={{width:40,height:40,borderRadius:10,border:"none",cursor:"pointer",fontSize:14,fontWeight:500,fontFamily:"inherit",background:playerCount===n?"#111":"#f3f4f6",color:playerCount===n?"#fff":"#6b7280"}}>{n}</button>
              ))}
            </div>
          </div>
          <div style={{padding:"24px 20px 0"}}>
            <div style={{fontSize:11,fontWeight:500,color:"#9ca3af",letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:10}}>플레이어</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {Array.from({length:playerCount},(_,pi)=>(
                <PlayerPicker key={pi} pi={pi} name={names[pi]} names={names} playerCount={playerCount} color={PLAYER_COLORS[pi]}
                  onChange={v=>{const n=[...names];n[pi]=v;setNames(n);}}
                  onSelect={m=>{const n=[...names];n[pi]=m;setNames(n);}}/>
              ))}
            </div>
          </div>
          <div style={{padding:"24px 20px 0"}}>
            <div style={{fontSize:11,fontWeight:500,color:"#9ca3af",letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:10}}>홀 단가</div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <button onClick={()=>setUnitPrice(v=>Math.max(1000,v-1000))} style={circleBtn}>−</button>
              <div style={{flex:1,position:"relative"}}>
                <input type="number" min={1000} step={1000} value={unitPrice} onChange={e=>setUnitPrice(Math.max(1000,parseInt(e.target.value)||1000))}
                  style={{width:"100%",padding:"12px 40px 12px 16px",borderRadius:12,border:"1.5px solid #e5e7eb",background:"#fff",color:"#111",fontSize:18,fontWeight:500,fontFamily:"inherit",outline:"none",textAlign:"center",boxSizing:"border-box"}}/>
                <span style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",fontSize:13,color:"#9ca3af",pointerEvents:"none"}}>원</span>
              </div>
              <button onClick={()=>setUnitPrice(v=>v+1000)} style={circleBtn}>+</button>
            </div>
          </div>
          <div style={{padding:"24px 20px 0"}}>
            <div style={{fontSize:11,fontWeight:500,color:"#9ca3af",letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:10}}>규칙 설정</div>
            <div style={{...card,padding:"0 16px",background:"#fff"}}>
              <Toggle checked={doubleRule} onChange={()=>setDoubleRule(v=>!v)} label="배판 적용"/>
              <div style={{borderTop:"0.5px solid #f3f4f6"}}/>
              <Toggle checked={birdiePlus} onChange={()=>setBirdiePlus(v=>!v)} label="버디값 적용"/>
            </div>
            {(doubleRule||birdiePlus)&&(
              <div style={{marginTop:10,padding:"12px 14px",borderRadius:10,background:"#f3f4f6"}}>
                {doubleRule&&<div style={{fontSize:12,color:"#6b7280",lineHeight:1.7}}>· 버디/이글, 3/4동점, 트리플보기 이상 → 2배</div>}
                {birdiePlus&&<div style={{fontSize:12,color:"#6b7280",lineHeight:1.7}}>· 버디/이글 포함 쌍 → 타수 차이 +1</div>}
              </div>
            )}
          </div>
          <div style={{padding:"28px 20px 0"}}>
            <button onClick={()=>{setHole(0);setScreen("play");}} style={{width:"100%",padding:"16px",borderRadius:14,border:"none",cursor:"pointer",background:"#111",color:"#fff",fontSize:16,fontWeight:500,fontFamily:"inherit"}}>게임 시작</button>
          </div>
        </div>
      );

      const isConfirmed = confirmed[hole];
      return (
        <div style={{maxWidth:420,margin:"0 auto",padding:"0 0 80px",background:"#f9fafb",minHeight:"100vh"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px",borderBottom:"0.5px solid #e5e7eb",background:"#fff"}}>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              {doubleRule&&<span style={pill("#059669","#D1FAE5")}>배판</span>}
              {birdiePlus&&<span style={pill("#2563EB","#DBEAFE")}>버디값</span>}
            </div>
            <button onClick={()=>setScreen("setup")} style={{display:"flex",alignItems:"center",gap:6,background:"#f3f4f6",border:"0.5px solid #e5e7eb",borderRadius:10,padding:"8px 14px",cursor:"pointer",fontSize:13,fontWeight:500,color:"#111",fontFamily:"inherit"}}>설정</button>
          </div>
          <div style={{padding:"16px 20px 0",background:"#fff"}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
              <button onClick={()=>setHole(h=>Math.max(0,h-1))} disabled={hole===0} style={{...circleBtn,opacity:hole===0?0.3:1,fontSize:18}}>‹</button>
              <div style={{flex:1,textAlign:"center"}}>
                <div style={{fontSize:28,fontWeight:500,lineHeight:1,color:"#111"}}>{hole+1}홀</div>
                <div style={{fontSize:13,color:"#6b7280",marginTop:2}}>파 {pars[hole]}</div>
              </div>
              <button onClick={()=>setHole(h=>Math.min(17,h+1))} disabled={hole===17} style={{...circleBtn,opacity:hole===17?0.3:1,fontSize:18}}>›</button>
            </div>
            <div style={{display:"flex",gap:4,justifyContent:"center",flexWrap:"wrap",paddingBottom:16}}>
              {Array.from({length:18},(_,hi)=>{
                const r=results[hi],c=confirmed[hi],isCur=hi===hole;
                const dc=!c?"#e5e7eb":r?.hasTriplePlus?"#DC2626":r?.hasSpecial?"#7C3AED":r?.isGroupTie?"#D97706":"#059669";
                return <div key={hi} onClick={()=>setHole(hi)} style={{width:isCur?28:8,height:8,borderRadius:4,cursor:"pointer",background:isCur?"#111":c?dc:"#f3f4f6",transition:"width 0.2s"}}/>;
              })}
            </div>
          </div>
          <div style={{padding:"12px 20px 0"}}>
            <div style={{...card,padding:"14px 16px",background:"#fff"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span style={{fontSize:14,color:"#6b7280"}}>이 홀 파</span>
                <div style={{display:"flex",alignItems:"center",gap:14}}>
                  <button onClick={()=>adjPar(-1)} disabled={pars[hole]<=3} style={{...circleBtn,width:34,height:34,opacity:pars[hole]<=3?0.3:1}}>−</button>
                  <span style={{fontSize:22,fontWeight:500,minWidth:20,textAlign:"center",color:"#111"}}>{pars[hole]}</span>
                  <button onClick={()=>adjPar(1)} disabled={pars[hole]>=5} style={{...circleBtn,width:34,height:34,opacity:pars[hole]>=5?0.3:1}}>+</button>
                </div>
              </div>
            </div>
          </div>
          <div style={{padding:"12px 20px 0"}}>
            <div style={{...card,padding:"20px 16px",background:"#fff"}}>
              {[...Array(Math.ceil(playerCount/4))].map((_, rowIdx) => (
                <div key={rowIdx} style={{display:"grid", gridTemplateColumns:`repeat(${Math.min(playerCount - rowIdx*4, 4)}, 1fr)`, gap:12, marginBottom: rowIdx < Math.ceil(playerCount/4)-1 ? 16 : 0}}>
                  {players.slice(rowIdx*4, rowIdx*4+4).map((name, i)=>{
                    const pi = rowIdx*4+i;
                    const d=dispScore(pi,hole),isDef=scores[pi][hole]===null,meta=SCORE_META(d-pars[hole]);
                    return (
                      <div key={pi} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
                        <div style={{fontSize:11,fontWeight:500,color:PLAYER_COLORS[pi],overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"100%",textAlign:"center"}}>{name}</div>
                        <div style={{display:"flex",alignItems:"center",gap:4}}>
                          <button onClick={()=>adjScore(pi,-1)} style={{...circleBtn,width:32,height:32,fontSize:16}}>−</button>
                          <div style={{width:48,height:48,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontWeight:500,background:isDef?"#f9fafb":meta.color+"15",color:isDef?"#9ca3af":meta.color,border:`1.5px solid ${isDef?"#e5e7eb":meta.color+"40"}`,transition:"all 0.15s"}}>{d}</div>
                          <button onClick={()=>adjScore(pi,1)} style={{...circleBtn,width:32,height:32,fontSize:16}}>+</button>
                        </div>
                        <span style={{fontSize:11,fontWeight:500,color:isDef?"#9ca3af":meta.color,minHeight:16}}>{isDef?"—":meta.short}</span>
                      </div>
                    );
                    })}
                </div>
              ))}
            </div>
          </div>
          {isConfirmed&&cur&&(
            <div style={{padding:"12px 20px 0"}}>
              <div style={{...card,padding:"16px",background:"#fff"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                    <span style={{fontSize:13,fontWeight:500,color:"#111"}}>{hole+1}홀 정산</span>
                    {cur.hasSpecial&&<span style={pill("#7C3AED")}>버디/이글 2배</span>}
                    {cur.isGroupTie&&<span style={pill("#D97706")}>동점 2배</span>}
                    {cur.hasTriplePlus&&<span style={pill("#DC2626")}>트리플+ 2배</span>}
                    {cur.multiplier>1&&<span style={pill("#6B7280")}>{cur.effectiveUnit.toLocaleString()}원/타</span>}
                  </div>
                  <button onClick={()=>setShowDetail(v=>!v)} style={{background:"transparent",border:"0.5px solid #e5e7eb",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:11,color:"#6b7280",fontFamily:"inherit",flexShrink:0}}>{showDetail?"접기":"상세"}</button>
                </div>
                {players.map((name,pi)=>{
                  const amt=Math.round(cur.settlements[pi]),meta=SCORE_META(cur.sc[pi]-pars[hole]);
                  return (
                    <div key={pi} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderTop:"0.5px solid #f3f4f6"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:6,height:6,borderRadius:"50%",background:PLAYER_COLORS[pi]}}/>
                        <span style={{fontSize:14,fontWeight:500,color:"#111"}}>{name}</span>
                        <span style={{fontSize:12,color:meta.color}}>{meta.short}</span>
                      </div>
                      <span style={{fontSize:15,fontWeight:500,color:amt>0?"#059669":amt<0?"#DC2626":"#9ca3af"}}>{fmtAmt(amt)}</span>
                    </div>
                  );
                })}
                {showDetail&&(
                  <div style={{marginTop:10,paddingTop:10,borderTop:"0.5px solid #f3f4f6"}}>
                    {cur.pairs.map(({i,j,sc_i,sc_j,iSp,jSp,adjDiff,amount})=>{
                      const w=adjDiff>0?i:adjDiff<0?j:null;
                      return (
                        <div key={`${i}-${j}`} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"5px 10px",borderRadius:8,background:"#f9fafb",marginBottom:4}}>
                          <span style={{color:"#6b7280"}}>
                            <span style={{color:PLAYER_COLORS[i],fontWeight:500}}>{players[i]}</span>{iSp?"★":""} {sc_i}타 vs <span style={{color:PLAYER_COLORS[j],fontWeight:500}}>{players[j]}</span>{jSp?"★":""} {sc_j}타
                            {birdiePlus&&iSp!==jSp&&<span style={{color:"#7C3AED"}}> (+1)</span>}
                          </span>
                          {w!==null?<span style={{color:"#059669",fontWeight:500}}>{players[w]} +{amount.toLocaleString()}원</span>:<span style={{color:"#9ca3af"}}>동타</span>}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>
          )}
          <div style={{padding:"12px 20px 0"}}>
            <div style={{...card,padding:"16px",background:"#fff"}}>
              <div style={{fontSize:11,color:"#9ca3af",marginBottom:12,fontWeight:500,letterSpacing:"0.04em",textTransform:"uppercase"}}>누적 정산</div>
              {[...players.map((name,pi)=>({name,pi,c:Math.round(cumulative[pi])}))].sort((a,b)=>b.c-a.c).map(({name,pi,c})=>{
                const pct=Math.abs(c)/maxAbs*50;
                return (
                  <div key={pi} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                    <div style={{width:72,display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                      <div style={{width:6,height:6,borderRadius:"50%",background:PLAYER_COLORS[pi],flexShrink:0}}/>
                      <span style={{fontSize:12,fontWeight:500,color:"#111",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name}</span>
                    </div>
                    <div style={{flex:1,height:8,position:"relative"}}>
                      <div style={{position:"absolute",inset:0,background:"#f3f4f6",borderRadius:4}}/>
                      <div style={{position:"absolute",left:"50%",top:0,bottom:0,width:1,background:"#e5e7eb",transform:"translateX(-50%)"}}/>
                      {c!==0&&<div style={{position:"absolute",height:"100%",width:pct+"%",background:c>0?"#059669":"#DC2626",left:c>0?"50%":`${50-pct}%`,borderRadius:c>0?"0 4px 4px 0":"4px 0 0 4px"}}/>}
                    </div>
                    <span style={{fontSize:13,fontWeight:500,minWidth:80,textAlign:"right",color:c>0?"#059669":c<0?"#DC2626":"#9ca3af"}}>{fmtAmt(c)}</span>
                  </div>
                );
              })}
            </div>
          </div>
          <div style={{padding:"16px 20px 0"}}>
            <button onClick={confirmHole} style={{width:"100%",padding:"17px",borderRadius:14,border:"none",cursor:"pointer",background:isConfirmed&&hole<17?"#1D4ED8":"#111827",color:"#ffffff",fontSize:16,fontWeight:500,fontFamily:"inherit",letterSpacing:"0.01em"}}>
              {isConfirmed&&hole<17?"다음 홀 →":isConfirmed&&hole===17?"최종 정산 보기":"입력 완료 · 다음 홀 →"}
            </button>
          </div>
          {showResult&&(
            <div style={{position:"fixed",inset:0,zIndex:9999,display:"flex",flexDirection:"column",justifyContent:"flex-end",background:"rgba(0,0,0,0.5)"}}>
              <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"24px 20px 40px"}}>
                <div style={{width:36,height:4,borderRadius:2,background:"#e5e7eb",margin:"0 auto 20px"}}/>
                <div style={{fontSize:20,fontWeight:500,marginBottom:4,color:"#111"}}>최종 정산</div>
                <div style={{fontSize:13,color:"#6b7280",marginBottom:20}}>18홀 완료</div>
                {[...players.map((name,pi)=>({name,pi,c:Math.round(cumulative[pi])}))].sort((a,b)=>b.c-a.c).map(({name,pi,c},rank)=>(
                  <div key={pi} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 0",borderBottom:"0.5px solid #f3f4f6"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontSize:13,color:"#9ca3af",width:20}}>{rank+1}</span>
                      <div style={{width:8,height:8,borderRadius:"50%",background:PLAYER_COLORS[pi]}}/>
                      <span style={{fontSize:16,fontWeight:500,color:"#111"}}>{name}</span>
                    </div>
                    <span style={{fontSize:18,fontWeight:500,color:c>0?"#059669":c<0?"#DC2626":"#9ca3af"}}>{fmtAmt(c)}</span>
                  </div>
                ))}
                <button onClick={()=>setShowResult(false)} style={{width:"100%",padding:"16px",borderRadius:14,border:"none",cursor:"pointer",background:"#111",color:"#fff",fontSize:16,fontWeight:500,fontFamily:"inherit",marginTop:20}}>돌아가기</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
